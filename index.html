<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="La Fete 2026"/>
<meta name="theme-color" content="#ffffff"/>
<title>La Fete de Marquette 2026 — Equipment Tracker</title>
<link rel="manifest" href="manifest.json"/>
<style>
  /* ── RESET & BASE ── */
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{height:100%;font-size:16px}
  body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f7;color:#1d1d1f;overscroll-behavior:none}

  /* ── LAYOUT ── */
  #app{max-width:560px;margin:0 auto;padding:0 0 80px;min-height:100vh}
  .page{display:none;padding:16px 16px 0}
  .page.active{display:block}

  /* ── HEADER ── */
  .app-header{text-align:center;padding:20px 16px 16px;border-bottom:1px solid #e5e5ea;background:#fff;position:sticky;top:0;z-index:10}
  .app-title{font-size:17px;font-weight:600;color:#1d1d1f;line-height:1.2}
  .app-subtitle{font-size:12px;color:#8e8e93;margin-top:2px;letter-spacing:.2px}

  /* ── BOTTOM NAV ── */
  .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e5e5ea;display:flex;z-index:20;max-width:560px;margin:0 auto}
  .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px 10px;cursor:pointer;border:none;background:transparent;color:#8e8e93;font-size:10px;gap:3px;transition:color .15s}
  .nav-item.active{color:#007aff}
  .nav-icon{width:24px;height:24px}

  /* ── CARDS ── */
  .card{background:#fff;border-radius:12px;overflow:hidden;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .card-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid #f2f2f7}
  .card-title{font-size:14px;font-weight:600;color:#1d1d1f;display:flex;align-items:center;gap:6px;flex-wrap:wrap}

  /* ── METRICS ── */
  .metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
  .metric{background:#fff;border-radius:10px;padding:12px 14px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
  .metric-label{font-size:11px;color:#8e8e93;margin-bottom:2px;font-weight:500}
  .metric-value{font-size:26px;font-weight:700;line-height:1}
  .metric-value.green{color:#34c759}
  .metric-value.red{color:#ff3b30}
  .metric-value.blue{color:#007aff}
  .metric-value.orange{color:#ff9500}

  /* ── BADGES ── */
  .badge{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:600;white-space:nowrap}
  .badge-blue{background:#e3f0ff;color:#0055b3}
  .badge-amber{background:#fff3e0;color:#7d4200}
  .badge-green{background:#e8f9ed;color:#1a7335}
  .badge-purple{background:#f0eeff;color:#3d2b9e}
  .badge-gray{background:#f2f2f7;color:#6e6e73}
  .badge-teal{background:#e0f7f0;color:#0a5c45}
  .badge-red{background:#fff0f0;color:#8b0000}

  /* ── DOT STATUS ── */
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0}
  .dot-g{background:#34c759}
  .dot-a{background:#ff9500}
  .dot-r{background:#ff3b30}
  .dot-b{background:#007aff}

  /* ── PAIR SET ── */
  .pair-set{padding:12px 14px;border-bottom:1px solid #f2f2f7}
  .pair-set:last-child{border-bottom:none}
  .pair-set.overdue{background:#fff5f5}
  .pair-set-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px}
  .pair-set-title{font-size:14px;font-weight:600;color:#1d1d1f;display:flex;align-items:center;gap:6px;flex-wrap:wrap;flex:1;min-width:0}
  .pair-set-btns{display:flex;gap:5px;flex-shrink:0}
  .pair-item-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0 6px 12px;border-top:1px solid #f2f2f7;margin-top:4px;gap:8px}
  .pair-item-label{font-size:13px;color:#6e6e73;display:flex;align-items:center;gap:5px}
  .pair-item-right{display:flex;align-items:center;gap:6px}
  .pair-item-status{font-size:12px}
  .link-line{width:1px;height:10px;background:#d1d1d6;margin:0 auto 0 16px}

  /* ── BUTTONS ── */
  .btn{font-size:13px;padding:7px 13px;border-radius:8px;border:1px solid;cursor:pointer;background:transparent;white-space:nowrap;font-weight:500;transition:all .15s}
  .btn-co{border-color:#ff9500;color:#7d4200}.btn-co:active{background:#fff3e0}
  .btn-ci{border-color:#34c759;color:#1a7335}.btn-ci:active{background:#e8f9ed}
  .btn-qr{border-color:#7c6ee6;color:#3d2b9e}.btn-qr:active{background:#f0eeff}
  .btn-sm{font-size:11px;padding:5px 10px;border-radius:6px}
  .btn-primary{width:100%;padding:14px;background:#007aff;color:#fff;border:none;border-radius:12px;font-size:16px;cursor:pointer;font-weight:600;margin-top:6px;transition:background .15s}
  .btn-primary:active{background:#0062cc}
  .btn-primary.green{background:#34c759}.btn-primary.green:active{background:#248a3d}
  .btn-secondary{width:100%;padding:12px;background:#f2f2f7;color:#1d1d1f;border:none;border-radius:12px;font-size:15px;cursor:pointer;font-weight:500;margin-top:8px}
  .btn-secondary:active{background:#e5e5ea}

  /* ── SCAN SCREEN ── */
  .scan-wrap{background:#fff;border-radius:12px;padding:20px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .scan-hero{text-align:center;padding:12px 0 20px}
  .scan-icon-wrap{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
  .scan-icon-wrap.ccr{background:#e3f0ff}
  .scan-icon-wrap.rad{background:#fff3e0}
  .scan-title{font-size:22px;font-weight:700;color:#1d1d1f;margin-bottom:4px}
  .scan-sub{font-size:14px;color:#8e8e93}
  .scan-status-pill{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:20px;font-size:14px;font-weight:600;margin-top:12px}
  .scan-status-pill.avail{background:#e8f9ed;color:#1a7335}
  .scan-status-pill.out{background:#fff3e0;color:#7d4200}
  .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
  .info-cell{background:#f9f9fb;border-radius:10px;padding:10px 12px}
  .info-label{font-size:11px;color:#8e8e93;margin-bottom:3px;font-weight:500}
  .info-value{font-size:14px;font-weight:600;color:#1d1d1f}
  .paired-notice{background:#e0f7f0;border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:#0a5c45;display:flex;align-items:center;gap:8px;font-weight:500}
  .out-notice{background:#fff3e0;border-radius:10px;padding:12px 14px;margin-bottom:14px;font-size:13px;color:#7d4200}

  /* ── FORM FIELDS ── */
  .field{margin-bottom:14px}
  .field label{display:block;font-size:13px;color:#6e6e73;margin-bottom:6px;font-weight:500}
  .field input,.field select{width:100%;font-size:16px;padding:12px 14px;border:1px solid #d1d1d6;border-radius:10px;background:#fff;color:#1d1d1f;outline:none;-webkit-appearance:none;appearance:none}
  .field input:focus,.field select:focus{border-color:#007aff}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .radio-group{display:flex;gap:8px}
  .radio-opt{flex:1;display:flex;align-items:center;gap:8px;background:#f9f9fb;padding:12px;border-radius:10px;cursor:pointer;border:1.5px solid transparent;font-size:14px;font-weight:500}
  .radio-opt input{width:auto;margin:0}
  .radio-opt.selected{border-color:#007aff;background:#e3f0ff;color:#0055b3}

  /* ── RECEIPT ── */
  .receipt{background:#f9f9fb;border-radius:10px;padding:14px;margin:14px 0}
  .receipt-row{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid #f2f2f7;gap:10px}
  .receipt-row:last-child{border-bottom:none}
  .receipt-label{color:#8e8e93;flex-shrink:0}
  .receipt-value{color:#1d1d1f;font-weight:600;text-align:right}
  .confirm-screen{text-align:center;padding:16px 0}
  .confirm-icon{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:30px}

  /* ── ALERT BANNER ── */
  .alert-banner{background:#fff5f5;border:1px solid #ffcdd2;border-radius:12px;padding:14px 16px;margin-bottom:14px}
  .alert-banner-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .alert-banner-title{font-size:14px;font-weight:700;color:#8b0000}
  .alert-item{display:flex;align-items:flex-start;justify-content:space-between;padding:8px 0;border-bottom:1px solid #ffcdd2;font-size:13px;gap:8px}
  .alert-item:last-child{border-bottom:none}
  .alert-item-name{color:#5c0000;font-weight:600}
  .alert-item-detail{color:#8b0000;font-size:12px;margin-top:2px}
  .alert-item-time{color:#c62828;font-size:12px;white-space:nowrap;text-align:right;flex-shrink:0}

  /* ── LOG ── */
  .log-row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:start;padding:11px 14px;border-bottom:1px solid #f2f2f7}
  .log-row:last-child{border-bottom:none}
  .log-name{font-size:14px;font-weight:600;color:#1d1d1f}
  .log-detail{font-size:12px;color:#8e8e93;margin-top:2px;line-height:1.5}
  .log-location{color:#3d2b9e}
  .log-time{font-size:11px;color:#aeaeb2;text-align:right;white-space:nowrap;margin-top:2px}
  .empty-state{padding:32px 16px;text-align:center;color:#8e8e93;font-size:14px}

  /* ── ADMIN LOCK ── */
  .lock-screen{background:#fff;border-radius:12px;padding:28px 20px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .lock-screen h2{font-size:20px;font-weight:700;margin-bottom:6px}
  .lock-screen p{font-size:14px;color:#8e8e93;margin-bottom:20px}
  .pin-input{max-width:180px;text-align:center;letter-spacing:6px;font-size:22px;display:block;margin:0 auto 16px;padding:14px;border:1.5px solid #d1d1d6;border-radius:10px;background:#fff;outline:none}
  .pin-input:focus{border-color:#007aff}

  /* ── SEARCH & FILTER ── */
  .search-box{padding:10px 14px;border-bottom:1px solid #f2f2f7}
  .search-box input{width:100%;font-size:14px;padding:9px 12px;border:1px solid #d1d1d6;border-radius:8px;background:#f9f9fb;outline:none}
  .filter-strip{display:flex;gap:6px;padding:10px 14px;border-bottom:1px solid #f2f2f7;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .filter-strip::-webkit-scrollbar{display:none}
  .filter-chip{font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid #d1d1d6;background:transparent;cursor:pointer;color:#6e6e73;white-space:nowrap;font-weight:500;flex-shrink:0}
  .filter-chip.active{background:#e3f0ff;border-color:#007aff;color:#0055b3}

  /* ── SETTINGS ── */
  .settings-section{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .settings-section h3{font-size:15px;font-weight:700;color:#1d1d1f;margin-bottom:4px}
  .settings-section .desc{font-size:12px;color:#8e8e93;margin-bottom:14px}
  .save-btn{padding:10px 22px;background:#007aff;color:#fff;border:none;border-radius:10px;font-size:14px;cursor:pointer;font-weight:600}
  .save-btn:active{background:#0062cc}
  .ejs-status{display:flex;align-items:center;gap:6px;margin-bottom:14px}
  .ejs-dot{width:10px;height:10px;border-radius:50%}
  .ejs-dot.green{background:#34c759}
  .ejs-dot.amber{background:#ff9500}
  .ejs-status-text{font-size:13px;font-weight:600;color:#1d1d1f}
  .divider{border:none;border-top:1px solid #f2f2f7;margin:14px 0}
  .export-link{font-size:13px;color:#007aff;cursor:pointer;background:none;border:none;font-weight:500;padding:6px 0}

  /* ── QR MODAL ── */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;z-index:100;padding:0}
  .modal-sheet{background:#fff;border-radius:20px 20px 0 0;padding:20px 20px 32px;width:100%;max-width:560px;text-align:center;animation:slideUp .25s ease}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .modal-handle{width:36px;height:4px;background:#d1d1d6;border-radius:2px;margin:0 auto 16px}
  .modal-sheet h3{font-size:18px;font-weight:700;margin-bottom:4px}
  .modal-sheet p{font-size:13px;color:#8e8e93;margin-bottom:16px}
  .qr-box{background:#fff;border-radius:10px;padding:14px;display:inline-block;border:1px solid #e5e5ea;margin-bottom:16px}
  .qr-note{font-size:12px;color:#8e8e93;background:#f9f9fb;border-radius:8px;padding:10px;margin-bottom:16px;text-align:left;line-height:1.6}
  .modal-close{padding:12px 32px;background:#f2f2f7;color:#1d1d1f;border:none;border-radius:10px;font-size:15px;cursor:pointer;font-weight:600}

  /* ── SEGMENT CONTROL ── */
  .seg-ctrl{display:flex;background:#e5e5ea;border-radius:9px;padding:2px;margin-bottom:14px}
  .seg-btn{flex:1;padding:7px 4px;border:none;background:transparent;border-radius:7px;font-size:13px;cursor:pointer;color:#6e6e73;font-weight:500;transition:all .15s}
  .seg-btn.active{background:#fff;color:#1d1d1f;font-weight:600;box-shadow:0 1px 2px rgba(0,0,0,.12)}

  /* ── ADMIN TABS ── */
  .admin-tabs{display:flex;background:#e5e5ea;border-radius:9px;padding:2px;margin-bottom:14px}
  .admin-tab{flex:1;padding:7px 4px;border:none;background:transparent;border-radius:7px;font-size:13px;cursor:pointer;color:#6e6e73;font-weight:500}
  .admin-tab.active{background:#fff;color:#1d1d1f;font-weight:600;box-shadow:0 1px 2px rgba(0,0,0,.12)}

  /* ── BACK BTN ── */
  .back-btn{display:inline-flex;align-items:center;gap:5px;font-size:14px;color:#007aff;cursor:pointer;background:none;border:none;padding:0;margin-bottom:14px;font-weight:500}

  /* ── TOAST ── */
  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#fff;border-radius:20px;padding:10px 20px;font-size:14px;font-weight:500;opacity:0;transition:opacity .25s;white-space:nowrap;pointer-events:none;z-index:999}
  .toast.show{opacity:1}

  /* ── SYNC STATUS ── */
  .sync-bar{display:flex;align-items:center;justify-content:center;gap:5px;font-size:11px;color:#8e8e93;padding:6px;background:#f9f9fb;border-bottom:1px solid #f2f2f7}
  .sync-dot{width:6px;height:6px;border-radius:50%;background:#34c759}
  .sync-dot.offline{background:#ff3b30}
  .sync-dot.syncing{background:#ff9500;animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  /* ── RESPONSIVE ── */
  @media(min-width:560px){
    .bottom-nav{left:50%;transform:translateX(-50%);width:560px}
    .modal-overlay{align-items:center}
    .modal-sheet{border-radius:20px;max-height:90vh;overflow-y:auto}
  }
</style>
</head>
<body>

<div id="app">
  <div class="app-header">
    <div class="app-title">La Fete de Marquette 2026</div>
    <div class="app-subtitle">Equipment Tracker</div>
    <div class="sync-bar" id="sync-bar">
      <div class="sync-dot syncing" id="sync-dot"></div>
      <span id="sync-text">Connecting...</span>
    </div>
  </div>

  <div class="page active" id="page-scan">
    <div style="padding-top:12px" id="scan-content"></div>
  </div>

  <div class="page" id="page-inventory">
    <div style="padding-top:12px" id="inventory-content"></div>
  </div>

  <div class="page" id="page-admin">
    <div style="padding-top:12px" id="admin-content"></div>
  </div>
</div>

<nav class="bottom-nav">
  <button class="nav-item active" onclick="showPage('scan',this)" id="nav-scan">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>

    Scan

  <button class="nav-item" onclick="showPage('inventory',this)" id="nav-inventory">

      <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
      <rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/>
      <line x1="9" y1="16" x2="13" y2="16"/>

  </button>
  <button class="nav-item" onclick="showPage('admin',this)" id="nav-admin">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
    </svg>
    Admin
  </button>
</nav>

<div id="modal-container"></div>
<div class="toast" id="toast"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>

<script>
// ════════════════════════════════════════════════
// CONFIG — edit these values to update the app
// ════════════════════════════════════════════════
const CONFIG = {
  appName:      'La Fete de Marquette 2026',
  adminPin:     '8510',

  alertMinutes: 30,

  // EmailJS — paste your credentials here after setup

  // Firebase — paste your config here after setup

  messagingSenderId: "304311205248",
  appId: "1:304311205248:web:a3fea0cb9d23f840431565",
  measurementId: "G-LLYLJJJLTZ"

  },

  locations: [
    'Sun Stage Left','Sun Stage Right','Cabaret',
    'Moon Stage 1','Moon Stage 2','Family Fete',
    'Lagniappe','Lafayette','Prize Wheel'
  ],

  ccrLocations: {
    1:'Sun Stage Left', 2:'Sun Stage Right', 3:'Cabaret',
    4:'Moon Stage 1',   5:'Moon Stage 2',    6:'Family Fete',
    7:'Lagniappe',      8:'Lafayette',       9:'Prize Wheel',
    10:'Sun Stage Left',11:'Sun Stage Right',12:'Cabaret',
    13:'Moon Stage 1',  14:'Moon Stage 2',   15:'Family Fete'
  }
};

// ════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════
let db = null;
let isOnline = false;
let adminUnlocked = false;
let adminTab = 'log';
let scanState = null;
let scanConfirmed = false;
let logFilter = 'all';
let logSearch = '';
let alertsSent = new Set();
let ejsCfg = { ...CONFIG.emailjs, alertMinutes: CONFIG.alertMinutes, alertTime: CONFIG.alertTime };

// Local state (synced from Firebase)
let gearState = {};
let activityLog = [];

// ════════════════════════════════════════════════
// INIT GEAR
// ════════════════════════════════════════════════
function defaultGearState() {
  const state = {};
  for (let i = 1; i <= 15; i++) {
    state[`ccr_${i}`] = {
      id: i, type: 'ccr', label: `Reader ${i}`,
      location: CONFIG.ccrLocations[i],
      out: false, person: null, shift: null, time: null,
      checkoutTs: null, pairedRadio: i
    };
  }
  for (let i = 1; i <= 25; i++) {
    state[`radio_${i}`] = {
      id: i, type: 'radio', label: `Radio ${i}`,
      out: false, person: null, shift: null, time: null,
      checkoutTs: null, pairedCCR: i <= 15 ? i : null
    };
  }
  return state;
}

// ════════════════════════════════════════════════
// FIREBASE
// ════════════════════════════════════════════════
function initFirebase() {
  try {
    if (CONFIG.firebase.apiKey === 'YOUR_API_KEY') {
      // Demo mode — use local state only
      gearState = defaultGearState();
      setSyncStatus('demo', 'Demo mode — data not shared');
      return;
    }
    const app = firebase.initializeApp(CONFIG.firebase);
    db = firebase.database(app);

    // Listen for gear state
    db.ref('gear').on('value', snap => {
      const data = snap.val();
      if (data) {
        gearState = data;
      } else {
        gearState = defaultGearState();
        db.ref('gear').set(gearState);
      }
      setSyncStatus('online', 'Live — all devices synced');
      renderCurrentPage();
    });

    // Listen for log
    db.ref('log').orderByChild('ts').limitToLast(200).on('value', snap => {
      activityLog = [];
      snap.forEach(child => activityLog.push(child.val()));
      activityLog.reverse();
      if (adminUnlocked && adminTab === 'log') renderAdmin();
    });

    db.ref('.info/connected').on('value', snap => {
      isOnline = snap.val();
      if (!isOnline) setSyncStatus('offline', 'Offline — reconnecting...');
    });

  } catch(e) {
    gearState = defaultGearState();
    setSyncStatus('demo', 'Demo mode — data not shared');
  }
}

function setSyncStatus(status, text) {
  const dot = document.getElementById('sync-dot');
  const label = document.getElementById('sync-text');
  if (!dot || !label) return;
  dot.className = 'sync-dot';
  if (status === 'online') dot.classList.add('green');
  else if (status === 'offline') dot.classList.add('offline');
  else dot.classList.add('syncing');
  label.textContent = text;
}

function saveGearItem(key) {
  if (db) {
    db.ref(`gear/${key}`).set(gearState[key]);
  }
}

function saveLogEntry(entry) {
  activityLog.unshift(entry);
  if (db) {
    db.ref('log').push(entry);
  }
}

// HELPERS
// ════════════════════════════════════════════════
function getItem(type, id) { return gearState[`${type}_${id}`]; }
function getPaired(item) {
  if (item.type === 'ccr' && item.pairedRadio) return gearState[`radio_${item.pairedRadio}`];
  if (item.type === 'radio' && item.pairedCCR) return gearState[`ccr_${item.pairedCCR}`];
  return null;
}
function nowTime() { return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }
function nowDate() { return new Date().toLocaleString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'}); }
function minsAgo(ts) { return Math.floor((Date.now() - ts) / 60000); }

function toast(msg, dur = 2800) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

function showPage(page, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.getElementById(`page-${page}`).classList.add('active');
  if (btn) btn.classList.add('active');
  scanState = null; scanConfirmed = false;
  renderCurrentPage();
}

function renderCurrentPage() {
  const active = document.querySelector('.page.active');
  if (!active) return;
  const id = active.id;
  if (id === 'page-scan') renderScan();
  else if (id === 'page-inventory') renderInventory();
  else if (id === 'page-admin') renderAdmin();
}

// ════════════════════════════════════════════════
// OVERDUE CHECK
// ════════════════════════════════════════════════
function getOverdue() {
  const res = [];
  const nowTs = Date.now();
  for (let i = 1; i <= 15; i++) {
    const c = gearState[`ccr_${i}`];
    const r = gearState[`radio_${i}`];
    if (!c || !r) continue;
    const ts = Math.min(
      c.out && c.checkoutTs ? c.checkoutTs : Infinity,
      r.out && r.checkoutTs ? r.checkoutTs : Infinity
    );
    if (ts === Infinity) continue;
    const mins = Math.floor((nowTs - ts) / 60000);
    if (mins >= ejsCfg.alertMinutes) {
      res.push({ setNum: i, person: c.out ? c.person : r.person, location: c.location, checkoutTime: c.out ? c.time : r.time, minutesOut: mins, reason: 'minutes' });
    }
  }
  const [h, m] = ejsCfg.alertTime.split(':').map(Number);
  const alertT = new Date(); alertT.setHours(h, m, 0, 0);
  if (Date.now() >= alertT.getTime()) {
    for (let i = 1; i <= 15; i++) {
      const c = gearState[`ccr_${i}`];
      const r = gearState[`radio_${i}`];
      if (!c || !r) continue;
      if ((c.out || r.out) && !res.find(x => x.setNum === i)) {
        res.push({ setNum: i, person: c.out ? c.person : r.person, location: c.location, checkoutTime: c.out ? c.time : r.time, reason: 'alert-time' });
      }
    }
  }
  return res;
}

function sendAlert(pair) {
  const key = `${pair.setNum}-${pair.reason}`;
  if (alertsSent.has(key)) return;
  alertsSent.add(key);
  const params = {
    to_email: ejsCfg.alertEmail || CONFIG.alertEmail,
    pair_name: `Set ${pair.setNum} (Reader ${pair.setNum} + Radio ${pair.setNum})`,
    location: pair.location, person: pair.person || 'Unknown',
    checkout_time: pair.checkoutTime || 'Unknown',
    alert_reason: pair.reason === 'alert-time'
      ? `Alert time (${ejsCfg.alertTime}) passed — gear not returned`
      : `Out ${pair.minutesOut}+ minutes with no check-in`,
    event_name: CONFIG.appName
  };
  if (ejsCfg.publicKey && ejsCfg.serviceId && ejsCfg.templateId) {
    emailjs.init(ejsCfg.publicKey);
    emailjs.send(ejsCfg.serviceId, ejsCfg.templateId, params)
      .then(() => toast(`Alert sent to ${params.to_email}`))
      .catch(() => toast('Email failed — check EmailJS settings'));
  } else {
    toast(`Overdue: Set ${pair.setNum} — configure EmailJS for real emails`, 3500);
  }
}

setInterval(() => {
  if (Object.keys(gearState).length > 0) {
    getOverdue().forEach(p => sendAlert(p));
  }
}, 60000);

  }
  scanState = { ...scanState, action: 'out', person: name, shift, time: t, doBoth, partner: doBoth ? partner : null,

  const t = nowTime(), d = nowDate();
  const key = `${type}_${id}`;
  saveLogEntry({ person: name, item: item.label, location: item.location || '—', shift, action: 'Checked in', time: d, cat: type, ts: Date.now() });
  gearState[key] = { ...item, out: false, person: null, shift: null, time: null, checkoutTs: null };
  saveGearItem(key);
  const baseId = type === 'ccr' ? id : item.pairedCCR;
  alertsSent.delete(`${baseId}-minutes`); alertsSent.delete(`${baseId}-alert-time`);
  if (doBoth) {
    const pKey = `${partner.type}_${partner.id}`;
    saveLogEntry({ person: name, item: partner.label, location: partner.location || '—', shift, action: 'Checked in', time: d, cat: partner.type, ts: Date.now() });
    gearState[pKey] = { ...partner, out: false, person: null, shift: null, time: null, checkoutTs: null };
    saveGearItem(pKey);
  }
  scanState = { ...scanState, action: 'in', person: name, shift, time: t, doBoth, partner: doBoth ? partner : null };
  scanConfirmed = true;
  renderScan();
}

    return `<div class="pair-set">
      <div class="pair-set-header">
        <div class="pair-set-title"><span class="dot ${r.out ? 'dot-a' : 'dot-g'}"></span>${r.label}<span class="badge badge-gray" style="font-size:10px">No reader</span></div>
        <div class="pair-set-btns">
          <button class="btn btn-qr btn-sm" onclick="showQR('radio',${r.id})">QR</button>
          <button class="btn ${r.out ? 'btn-ci' : 'btn-co'} btn-sm" onclick="triggerScanNav('radio',${r.id})">${r.out ? 'In' : 'Out'}</button>
        </div>
      </div>
      ${r.out ? `<div style="font-size:12px;color:#8e8e93;padding-left:12px;margin-top:2px">Out to ${r.person} · ${r.shift} · ${r.time}</div>` : ''}
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="metrics">
      <div class="metric"><div class="metric-label">Readers out</div><div class="metric-value red">${ccrOut}</div></div>
      <div class="metric"><div class="metric-label">Radios out</div><div class="metric-value orange">${radOut}</div></div>
      <div class="metric"><div class="metric-label">Sets free</div><div class="metric-value green">${15-setsOut}</div></div>
      <div class="metric"><div class="metric-label">Overdue</div><div class="metric-value ${overdueSets.size > 0 ? 'red' : 'green'}">${overdueSets.size}</div></div>
    </div>
    <div class="card">
      <div class="card-head"><div class="card-title">Paired sets 1–15</div><span class="badge badge-teal">${15-setsOut} of 15 free</span></div>
      ${pairedRows}
    </div>
    <div class="card">
      <div class="card-head"><div class="card-title">Extra radios 16–25</div></div>
      ${extraRadios}
    </div>`;
}

function triggerScanNav(type, id) {
  showPage('scan', document.getElementById('nav-scan'));
  setTimeout(() => triggerScan(type, id), 50);
}

// ════════════════════════════════════════════════
// QR MODAL
// ════════════════════════════════════════════════
function showQR(type, id) {
  const item = getItem(type, id);
  if (!item) return;
  const url = `${window.location.origin}${window.location.pathname}?scan=${type}&id=${id}`;
  document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay" onclick="closeModal(event)">
      <div class="modal-sheet" onclick="event.stopPropagation()">
        <div class="modal-handle"></div>
        <h3>${item.label}</h3>
        <p>${type === 'ccr' ? item.location : `Paired with Reader ${item.pairedCCR}`}<br>
           <span style="font-size:11px;color:#aeaeb2">${CONFIG.appName}</span></p>
        <div class="qr-box" id="qr-render"></div>
        <div class="qr-note"><strong>Print and stick on ${item.label}.</strong><br>Staff scan with phone camera — check-in/out screen opens automatically pre-loaded for this item.</div>
        <button class="modal-close" onclick="closeModal()">Close</button>
      </div>
    </div>`;
  try {
    new QRCode(document.getElementById('qr-render'), { text: url, width: 180, height: 180, colorDark: '#000', colorLight: '#fff', correctLevel: QRCode.CorrectLevel.M });
  } catch(e) {
    document.getElementById('qr-render').innerHTML = `<div style="width:180px;height:180px;display:flex;align-items:center;justify-content:center;font-size:13px;color:#666;text-align:center">${item.label}</div>`;
  }
}

function closeModal(e) {
  if (!e || e.target.classList.contains('modal-overlay')) {
    document.getElementById('modal-container').innerHTML = '';
  }
}

// ════════════════════════════════════════════════
// ADMIN PAGE
// ════════════════════════════════════════════════
function renderAdmin() {
  const el = document.getElementById('admin-content');
  if (!el) return;

  if (!adminUnlocked) {
    el.innerHTML = `
      <div class="lock-screen">
        <div style="font-size:40px;margin-bottom:10px">🔒</div>
        <h2>Admin access</h2>
        <p>${CONFIG.appName}</p>
        <input class="pin-input" type="password" id="pin-input" placeholder="••••" maxlength="6" onkeydown="if(event.key==='Enter')checkPin()"/>
        <button class="btn-primary" style="max-width:220px;margin:0 auto" onclick="checkPin()">Unlock</button>
      </div>`;
    return;
  }

  const overdue = getOverdue();
  let ccrOut = 0, radOut = 0;
  Object.values(gearState).forEach(i => { if (i.out && i.type==='ccr') ccrOut++; if (i.out && i.type==='radio') radOut++; });

  const alertBanner = overdue.length ? `
    <div class="alert-banner">
      <div class="alert-banner-head">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#8b0000" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        <span class="alert-banner-title">${overdue.length} set${overdue.length > 1 ? 's' : ''} overdue</span>
      </div>
      ${overdue.map(p => `<div class="alert-item">
        <div>
          <div class="alert-item-name">Set ${p.setNum} — ${p.location}</div>
          <div class="alert-item-detail">Out to ${p.person || 'Unknown'} since ${p.checkoutTime || '?'}${p.minutesOut ? ` · ${p.minutesOut} min` : ''}</div>
        </div>
        <div class="alert-item-time">${p.reason === 'alert-time' ? 'Past alert time' : 'Overdue'}</div>
      </div>`).join('')}
    </div>` : '';

  const filtered = activityLog.filter(e => {
    const mc = logFilter === 'all' || (logFilter === 'out' && e.action === 'Checked out') || (logFilter === 'in' && e.action === 'Checked in') || (logFilter === 'ccr' && e.cat === 'ccr') || (logFilter === 'radio' && e.cat === 'radio');
    const ms = !logSearch || [e.person, e.item, e.location, e.shift].some(v => v && v.toLowerCase().includes(logSearch.toLowerCase()));
    return mc && ms;
  });

  const logRows = filtered.length === 0
    ? '<div class="empty-state">No entries match</div>'
    : filtered.map(e => `
      <div class="log-row">
        <div>
          <div class="log-name">${e.person}</div>
          <div class="log-detail">${e.item}${e.location && e.location !== '—' ? ` · <span class="log-location">${e.location}</span>` : ''}<br>${e.shift}</div>
        </div>
        <div style="text-align:right">
          <span class="badge ${e.action === 'Checked out' ? 'badge-amber' : 'badge-green'}" style="display:inline-block;margin-bottom:4px">${e.action === 'Checked out' ? 'Out' : 'In'}</span>
          <div class="log-time">${e.time}</div>
        </div>
      </div>`).join('');

  const isConfigured = ejsCfg.serviceId && ejsCfg.templateId && ejsCfg.publicKey;

  const settingsHtml = `
    <div class="settings-section">
      <h3>Alert settings</h3>
      <div class="desc">Alerts sent to <strong>${CONFIG.alertEmail}</strong></div>
      <div class="field-row" style="margin-bottom:12px">
        <div class="field" style="margin-bottom:0"><label>Alert after (min)</label><input type="number" id="s-mins" value="${ejsCfg.alertMinutes}" min="1" max="480"/></div>
        <div class="field" style="margin-bottom:0"><label>Daily alert time</label><input type="time" id="s-time" value="${ejsCfg.alertTime}"/></div>
      </div>
      <button class="save-btn" onclick="saveAlertSettings()">Save alert times</button>
    </div>
    <div class="settings-section">
      <h3>EmailJS credentials</h3>
      <div class="desc">Required to send email alerts</div>
      <div class="ejs-status">
        <div class="ejs-dot ${isConfigured ? 'green' : 'amber'}"></div>
        <span class="ejs-status-text">EmailJS ${isConfigured ? 'connected' : 'not configured'}</span>
      </div>
      <div class="field"><label>Service ID</label><input type="text" id="s-sid" placeholder="service_xxxxxxx" value="${ejsCfg.serviceId || ''}"/></div>
      <div class="field"><label>Template ID</label><input type="text" id="s-tid" placeholder="template_xxxxxxx" value="${ejsCfg.templateId || ''}"/></div>
      <div class="field"><label>Public key</label><input type="text" id="s-key" placeholder="Your public key" value="${ejsCfg.publicKey || ''}"/></div>
      <button class="save-btn" onclick="saveEJS()">Save EmailJS credentials</button>
    </div>
    <div style="text-align:right;margin-top:8px">
      <button class="export-link" onclick="adminUnlocked=false;renderAdmin()">Lock admin</button>
    </div>`;

  el.innerHTML = `
    <div class="metrics">
      <div class="metric"><div class="metric-label">Readers out</div><div class="metric-value red">${ccrOut}</div></div>
      <div class="metric"><div class="metric-label">Radios out</div><div class="metric-value orange">${radOut}</div></div>
      <div class="metric"><div class="metric-label">Log entries</div><div class="metric-value blue">${activityLog.length}</div></div>
      <div class="metric"><div class="metric-label">Overdue</div><div class="metric-value ${overdue.length > 0 ? 'red' : 'green'}">${overdue.length}</div></div>
    </div>
    ${alertBanner}
    <div class="admin-tabs">
      <button class="admin-tab ${adminTab === 'log' ? 'active' : ''}" onclick="adminTab='log';renderAdmin()">Activity log</button>
      <button class="admin-tab ${adminTab === 'settings' ? 'active' : ''}" onclick="adminTab='settings';renderAdmin()">Email settings</button>
    </div>
    ${adminTab === 'log' ? `
      <div class="card">
        <div class="card-head">
          <div class="card-title">Activity log</div>
          <button class="export-link" onclick="exportCSV()">Export CSV</button>
        </div>
        <div class="search-box"><input type="text" placeholder="Search name, item, location..." value="${logSearch}" oninput="logSearch=this.value;renderAdmin()"/></div>
        <div class="filter-strip">
          <button class="filter-chip ${logFilter==='all'?'active':''}" onclick="logFilter='all';renderAdmin()">All</button>
          <button class="filter-chip ${logFilter==='out'?'active':''}" onclick="logFilter='out';renderAdmin()">Checked out</button>
          <button class="filter-chip ${logFilter==='in'?'active':''}" onclick="logFilter='in';renderAdmin()">Checked in</button>
          <button class="filter-chip ${logFilter==='ccr'?'active':''}" onclick="logFilter='ccr';renderAdmin()">Readers</button>
          <button class="filter-chip ${logFilter==='radio'?'active':''}" onclick="logFilter='radio';renderAdmin()">Radios</button>
        </div>
        ${activityLog.length === 0 ? '<div class="empty-state">No activity yet</div>' : logRows}
      </div>
      <div style="text-align:right;margin-top:4px">
        <button class="export-link" onclick="adminUnlocked=false;renderAdmin()">Lock admin</button>
      </div>
    ` : settingsHtml}`;
}

function checkPin() {
  const v = (document.getElementById('pin-input').value || '').trim();
  if (v === CONFIG.adminPin) { adminUnlocked = true; renderAdmin(); }
  else { toast('Incorrect PIN'); }
}

function saveAlertSettings() {
  ejsCfg.alertMinutes = parseInt(document.getElementById('s-mins').value) || 30;
  ejsCfg.alertTime = document.getElementById('s-time').value || '23:00';
  alertsSent.clear();
  toast(`Alerts: ${ejsCfg.alertMinutes} min overdue + daily at ${ejsCfg.alertTime}`);
  if (db) db.ref('settings/alerts').set({ alertMinutes: ejsCfg.alertMinutes, alertTime: ejsCfg.alertTime });
  renderAdmin();
}

function saveEJS() {
  ejsCfg.serviceId = document.getElementById('s-sid').value.trim();
  ejsCfg.templateId = document.getElementById('s-tid').value.trim();
  ejsCfg.publicKey = document.getElementById('s-key').value.trim();
  toast('EmailJS credentials saved');
  if (db) db.ref('settings/emailjs').set({ serviceId: ejsCfg.serviceId, templateId: ejsCfg.templateId, publicKey: ejsCfg.publicKey });
  renderAdmin();
}

function exportCSV() {
  if (!activityLog.length) { toast('No entries to export'); return; }
  const h = 'Name,Item,Location,Shift,Action,Time\n';
  const r = activityLog.map(e => `"${e.person}","${e.item}","${e.location||''}","${e.shift}","${e.action}","${e.time}"`).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([h+r], {type:'text/csv'}));
  a.download = 'La-Fete-de-Marquette-2026-gear-log.csv';
  a.click();
  toast('CSV downloaded');
}

// ════════════════════════════════════════════════
// URL SCAN PARAM
// ════════════════════════════════════════════════
function checkURLScan() {
  const params = new URLSearchParams(window.location.search);
  const type = params.get('scan');
  const id = parseInt(params.get('id'));
  if (type && id) {
    setTimeout(() => triggerScan(type, id), 300);
  }
}

// ════════════════════════════════════════════════
// BOOT
// ════════════════════════════════════════════════
initFirebase();
checkURLScan();
renderScan();
</script>
</body>
</html>
